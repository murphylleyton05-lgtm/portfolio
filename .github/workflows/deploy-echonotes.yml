name: Deploy sitio (Landing + EchoNotes) a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: echonotes/package-lock.json
      - run: npm ci
        working-directory: echonotes
      - run: npm run build
        working-directory: echonotes
      - name: Ensamblar sitio (landing en raiz + EchoNotes en /echonotes)
        run: |
          mkdir -p site
          cp -r lleyton-ia-landing/* site/
          mkdir -p site/echonotes
          cp -r echonotes/dist/* site/echonotes/
          mkdir -p site/crm
          cp -r command-center/* site/crm/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
