# Version LOCAL para demo en tu propia compu (sin VPS, sin dominio, sin HTTPS).
# Todo corre en localhost. Ideal para grabar un video de ventas.
# Uso: docker compose -f docker-compose.local.yml up -d

services:
  base: &base
    image: chatwoot/chatwoot:v3.16.0
    env_file: .env.local
    volumes:
      - storage:/app/storage
    restart: unless-stopped

  rails:
    <<: *base
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]

  sidekiq:
    <<: *base
    depends_on:
      - postgres
      - redis
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=chatwoot
      - POSTGRES_USER=chatwoot
      - POSTGRES_PASSWORD=demo1234

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --requirepass demo1234"]
    volumes:
      - redis_data:/data

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Argentina/Buenos_Aires
      - N8N_SECURE_COOKIE=false
      # Clave de la IA. Gemini es gratis; Claude es opcional (de pago).
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # n8n habla con Chatwoot por la red interna de Docker
      - CHATWOOT_URL=http://rails:3000
      - CHATWOOT_API_TOKEN=${CHATWOOT_API_TOKEN}
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  storage:
  postgres_data:
  redis_data:
  n8n_data:
